<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Behavioral Experiment</title>
  <style>
    :root {
      --light-blue: #B3CEE5;
      --dark-blue: #57B9FF;
      --black: #000000;
      --white: #FFFFFF;
      --red: #FF0000;
      --yellow: #FFD700;
      --panel-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      --soft-border: 2px solid #000000;
      --radius-lg: 24px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition-fast: 180ms ease;
      --transition-med: 350ms ease;
      --transition-slow: 550ms ease;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--white);
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-slow);
      background: var(--white);
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    .center-wrap {
      width: min(92vw, 900px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .panel {
      background: var(--light-blue);
      border-radius: var(--radius-lg);
      box-shadow: var(--panel-shadow);
      padding: 34px 34px 30px;
      text-align: center;
      max-width: 760px;
      width: 100%;
      line-height: 1.65;
    }

    .panel h1, .panel h2, .panel p {
      margin: 0 0 16px 0;
    }

    .panel h1 {
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 700;
    }

    .panel p {
      font-size: clamp(18px, 2.2vw, 22px);
    }

    .small-note {
      font-size: clamp(15px, 1.8vw, 18px);
    }

    .text-input {
      width: min(420px, 80%);
      padding: 14px 16px;
      font-size: 18px;
      border: 2px solid #000;
      border-radius: 14px;
      outline: none;
      margin: 10px auto 20px;
      display: block;
      background: #fff;
    }

    .btn {
      appearance: none;
      border: none;
      background: var(--dark-blue);
      color: var(--white);
      border-radius: var(--radius-md);
      padding: 14px 28px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      transition: transform var(--transition-fast), filter var(--transition-fast), opacity var(--transition-fast);
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
      min-width: 170px;
    }

    .btn:hover:not(:disabled),
    .btn:focus-visible:not(:disabled) {
      transform: scale(1.05);
      filter: brightness(1.02);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-text {
      margin-top: 12px;
      min-height: 24px;
      font-size: 16px;
      color: #333;
    }

    /* Task layout */
    .task-screen-inner {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: stretch;
      background: var(--white);
    }

    .task-main-region {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      overflow: hidden;
    }

    .choice-stage {
      position: absolute;
      inset: 0;
      opacity: 1;
      transition: opacity 300ms ease;
    }

    .choice-stage.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .choice-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    .choice-half {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      transition: background-color 220ms ease;
      overflow: hidden;
    }

    .choice-half:hover {
      background: rgba(179, 206, 229, 0.75);
    }

    .choice-half.disabled {
      cursor: default;
      pointer-events: none;
    }

    .divider {
      position: absolute;
      top: 12%;
      bottom: 12%;
      left: 50%;
      width: 2px;
      background: #000;
      transform: translateX(-50%);
      z-index: 5;
    }

    .choice-content {
      text-align: center;
      z-index: 2;
      padding: 24px;
    }

    .option-label {
      font-size: clamp(56px, 8vw, 92px);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .option-points {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .option-prob {
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 600;
    }

    .feedback {
      position: absolute;
      left: 50%;
      top: 68%;
      transform: translate(-50%, -50%);
      font-size: clamp(34px, 4vw, 52px);
      font-weight: 800;
      opacity: 0;
      transition: opacity 250ms ease, transform 250ms ease;
      pointer-events: none;
      z-index: 6;
      white-space: nowrap;
    }

    .feedback.visible {
      opacity: 1;
      transform: translate(-50%, -56%);
    }

    .feedback.left {
      left: 25%;
    }

    .feedback.right {
      left: 75%;
    }

    /* Center digit circle */
    .digit-circle {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(15vw, 130px);
      height: min(15vw, 130px);
      min-width: 90px;
      min-height: 90px;
      max-width: 130px;
      max-height: 130px;
      transform: translate(-50%, -50%);
      border: 2px solid #000;
      border-radius: 50%;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(34px, 4.3vw, 52px);
      font-weight: 800;
      z-index: 7;
      user-select: none;
    }

    .shake {
      animation: shake 360ms ease;
    }

    @keyframes shake {
      0% { transform: translate(-50%, -50%) translateX(0); }
      20% { transform: translate(-50%, -50%) translateX(-8px); }
      40% { transform: translate(-50%, -50%) translateX(8px); }
      60% { transform: translate(-50%, -50%) translateX(-6px); }
      80% { transform: translate(-50%, -50%) translateX(6px); }
      100% { transform: translate(-50%, -50%) translateX(0); }
    }

    /* Ranking panel */
    .ranking-wrap {
      height: 175px;
      background: transparent;
      padding: 0 20px 20px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      flex-shrink: 0;
      z-index: 8;
    }

    .ranking-panel {
      width: min(1000px, 95vw);
      background: #fff;
      border: 2px solid #000;
      border-radius: 18px;
      padding: 14px 18px 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .ranking-title {
      text-align: center;
      font-weight: 800;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .ranking-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      min-height: 34px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .score-pill {
      border: 2px solid #000;
      border-radius: 999px;
      padding: 6px 14px;
      min-width: 88px;
      text-align: center;
      font-weight: 700;
      background: #fff;
    }

    .score-pill.current {
      color: var(--red);
      border-color: var(--red);
    }

    .total-line {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
    }

    .total-line span {
      margin-left: 8px;
    }

    /* Message between sections */
    .click-anywhere-message {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      text-align: center;
      padding: 30px;
      font-size: clamp(24px, 3.2vw, 38px);
      font-weight: 700;
      line-height: 1.5;
      cursor: pointer;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 450ms ease;
    }

    .click-anywhere-message.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* Final screen */
    #fireworksCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: #fff;
    }

    .final-wrap {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 26px;
    }

    .final-panel {
      width: min(900px, 95vw);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 2px solid #000;
      border-radius: 24px;
      padding: 26px 24px 22px;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.08);
    }

    .final-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .final-header h2 {
      margin: 0 0 8px 0;
      font-size: clamp(28px, 4vw, 40px);
    }

    .final-header p {
      margin: 0;
      font-size: clamp(18px, 2vw, 22px);
      font-weight: 700;
    }

    .leaderboard-title {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin: 18px 0 16px;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .leaderboard-item {
      display: grid;
      grid-template-columns: 90px 1fr 160px;
      gap: 12px;
      align-items: center;
      border: 2px solid #000;
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 19px;
      font-weight: 700;
      background: #fff;
    }

    .leaderboard-item.top3 {
      background: rgba(255, 215, 0, 0.55);
    }

    .leaderboard-item.current-user {
      border-color: var(--red);
      color: var(--red);
      box-shadow: inset 0 0 0 2px rgba(255, 0, 0, 0.16);
    }

    .leaderboard-item.top3.current-user {
      background: linear-gradient(90deg, rgba(255, 215, 0, 0.55), rgba(255, 0, 0, 0.12));
    }

    .leaderboard-rank,
    .leaderboard-points {
      text-align: center;
    }

    .leaderboard-id {
      text-align: center;
      word-break: break-word;
    }

    .final-thanks {
      text-align: center;
      font-size: clamp(20px, 2.2vw, 26px);
      font-weight: 700;
      line-height: 1.5;
    }

    .loading-text {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #333;
    }

    .error-text {
      color: var(--red);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .digit-circle {
        top: 50%;
      }

      .leaderboard-item {
        grid-template-columns: 72px 1fr 110px;
        font-size: 16px;
      }

      .ranking-panel {
        padding: 12px;
      }

      .total-line {
        font-size: 24px;
      }
    }

    @media (max-width: 620px) {
      .ranking-wrap {
        height: 200px;
      }

      .score-pill {
        min-width: 74px;
        padding: 5px 10px;
        font-size: 14px;
      }

      .ranking-title {
        font-size: 20px;
      }

      .total-line {
        font-size: 22px;
      }

      .leaderboard-item {
        grid-template-columns: 60px 1fr 90px;
        gap: 8px;
        padding: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    /************************************************************
     * CONFIG
     ************************************************************/
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwpDd0GcDf0gfD6wGa-4oypi8_DGAx1tG-fffSM0o7ZwNiL3EPH-D4eDXMzMgs9HDEL3w/exec";

    const CONFIG = {
      stPracticeTrials: 3,
      mtPracticeTrials: 3,
      formalTrialsPerTask: 20,
      optionA: {
        label: 'A',
        points: 10,
        successProb: 0.8
      },
      optionB: {
        label: 'B',
        minX: 1,
        maxX: 60,
        successProb: 0.2
      },
      digitIntervalMs: 2000,
      choiceResponseMinDelayMs: 750,
      choiceResponseMaxDelayMs: 1000,
      betweenTrialFadeMs: 280,
      leaderboardRefreshMs: 3500
    };

    /************************************************************
     * GLOBAL STATE
     ************************************************************/
    const state = {
      assignedParticipantId: null,
      participantEnteredText: '',
      assignedTaskOrder: null, // "ST_First" or "MT_First"
      currentTotalPoints: 0,
      currentTask: null,
      currentTrial: 0,
      currentScreenName: '',
      currentTopFive: [],
      isTransitioning: false,
      submittedTrialKeys: new Set(),

      // MT digit task state
      digitTimer: null,
      digitKeyListener: null,
      currentDigit: null,
      digitThreeActive: false,
      digitThreeHandled: false,
      digitCircleEl: null,

      // ranking
      leaderboardPollTimer: null,

      // fireworks
      fireworksAnimFrame: null
    };

    const app = document.getElementById('app');

    /************************************************************
     * BASIC HELPERS
     ************************************************************/
    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function softRandomTaskOrder() {
      return Math.random() < 0.5 ? 'ST_First' : 'MT_First';
    }

    function awardPoints(choice, xValue) {
      if (choice === 'A') {
        return Math.random() < CONFIG.optionA.successProb ? CONFIG.optionA.points : 0;
      }
      return Math.random() < CONFIG.optionB.successProb ? xValue : 0;
    }

    function buildTrialKey(task, trialIndex) {
      return `${state.assignedParticipantId || 'NONE'}__${task}__${trialIndex}`;
    }

    function clearApp() {
      stopDigitTask();
      stopLeaderboardPolling();
      stopFireworks();
      app.innerHTML = '';
    }

    function mountScreen(screenEl) {
      app.appendChild(screenEl);
      requestAnimationFrame(() => {
        screenEl.classList.add('active');
      });
    }

    async function fadeOutAndReplace(currentScreen, nextBuilder) {
      if (state.isTransitioning) return;
      state.isTransitioning = true;
      if (currentScreen) {
        currentScreen.classList.remove('active');
        await sleep(500);
      }
      clearApp();
      nextBuilder();
      state.isTransitioning = false;
    }

    function createScreen() {
      const screen = document.createElement('div');
      screen.className = 'screen';
      return screen;
    }

    function createCenteredPanelScreen(innerHtml) {
      const screen = createScreen();
      screen.innerHTML = `
        <div class="center-wrap">
          <div class="panel">
            ${innerHtml}
          </div>
        </div>
      `;
      return screen;
    }

    function showStatus(el, text, isError = false) {
      el.textContent = text;
      el.classList.toggle('error-text', isError);
    }

    /************************************************************
     * BACKEND
     ************************************************************/
    async function postJSON(payload) {
      const res = await fetch(WEB_APP_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        throw new Error(`Network error: ${res.status}`);
      }
      return res.json();
    }

    async function getJSON(params) {
      const url = new URL(WEB_APP_URL);
      Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
      const res = await fetch(url.toString(), { method: 'GET' });
      if (!res.ok) {
        throw new Error(`Network error: ${res.status}`);
      }
      return res.json();
    }

    async function registerParticipant() {
      const data = await postJSON({ action: 'register_participant' });
      if (!data.success || !data.Participant_ID) {
        throw new Error(data.error || 'Failed to register participant.');
      }
      state.assignedParticipantId = String(data.Participant_ID);
      return state.assignedParticipantId;
    }

    async function saveFormalTrial({ task, trialIndex, choseA, xValue, pointsAwarded }) {
      const trialKey = buildTrialKey(task, trialIndex);
      if (state.submittedTrialKeys.has(trialKey)) {
        throw new Error(`Duplicate submission prevented for ${trialKey}`);
      }

      const payload = {
        action: 'save_trial',
        Participant_ID: state.assignedParticipantId,
        Task: task,
        Trial_Index: trialIndex,
        Chose_A: choseA,
        X_Value: xValue,
        Points_Awarded: pointsAwarded,
        Task_Order: state.assignedTaskOrder
      };

      const data = await postJSON(payload);
      if (!data.success) {
        throw new Error(data.error || 'Failed to save trial.');
      }

      state.submittedTrialKeys.add(trialKey);
      return data;
    }

    async function fetchTopFiveRanking() {
      const data = await getJSON({ action: 'get_ranking' });
      if (!data.success) throw new Error(data.error || 'Failed to fetch ranking.');
      return Array.isArray(data.ranking) ? data.ranking : [];
    }

    async function fetchParticipantSummary(participantId) {
      const data = await getJSON({
        action: 'get_participant_summary',
        participant_id: participantId
      });
      if (!data.success) throw new Error(data.error || 'Failed to fetch summary.');
      return data.summary;
    }

    async function fetchAllRawData() {
      const data = await getJSON({ action: 'get_all_raw_data' });
      if (!data.success) throw new Error(data.error || 'Failed to fetch raw data.');
      return Array.isArray(data.raw_data) ? data.raw_data : [];
    }

    async function buildFullLeaderboardFromRawData() {
      const rows = await fetchAllRawData();
      const totalsMap = new Map();

      for (const row of rows) {
        const id = String(row.Participant_ID || '');
        const pts = Number(row.Points_Awarded) || 0;
        if (!id) continue;
        if (!totalsMap.has(id)) {
          totalsMap.set(id, { Participant_ID: id, Total_Points: 0, Trial_Count: 0 });
        }
        const entry = totalsMap.get(id);
        entry.Total_Points += pts;
        entry.Trial_Count += 1;
      }

      const completed = [...totalsMap.values()]
        .filter(item => item.Trial_Count === 40)
        .map(item => ({
          Participant_ID: item.Participant_ID,
          Total_Points: item.Total_Points
        }))
        .sort((a, b) => b.Total_Points - a.Total_Points);

      return completed;
    }

    /************************************************************
     * RANKING DISPLAY HELPERS
     ************************************************************/
    function mergeCurrentParticipantIntoTopFive(remoteTopFive, currentPoints, participantId) {
      const list = (remoteTopFive || []).map(item => ({
        Participant_ID: String(item.Participant_ID),
        Total_Points: Number(item.Total_Points) || 0,
        isCurrent: false
      }));

      if (!participantId) return list.slice(0, 5);

      const existingIndex = list.findIndex(x => x.Participant_ID === participantId);
      if (existingIndex >= 0) {
        list[existingIndex].Total_Points = currentPoints;
        list[existingIndex].isCurrent = true;
      } else {
        list.push({
          Participant_ID: participantId,
          Total_Points: currentPoints,
          isCurrent: true
        });
      }

      list.sort((a, b) => b.Total_Points - a.Total_Points);
      return list.slice(0, 5);
    }

    function renderTopFive(rankingPanelEl, remoteTopFive) {
      const merged = mergeCurrentParticipantIntoTopFive(
        remoteTopFive,
        state.currentTotalPoints,
        state.assignedParticipantId
      );

      const rowEl = rankingPanelEl.querySelector('.ranking-row');
      const totalEl = rankingPanelEl.querySelector('.total-points-value');

      rowEl.innerHTML = '';
      for (const item of merged) {
        const pill = document.createElement('div');
        pill.className = 'score-pill' + (item.Participant_ID === state.assignedParticipantId ? ' current' : '');
        pill.textContent = `${item.Total_Points}`;
        rowEl.appendChild(pill);
      }

      totalEl.textContent = String(state.currentTotalPoints);
    }

    async function refreshTopFive(rankingPanelEl) {
      try {
        const topFive = await fetchTopFiveRanking();
        state.currentTopFive = topFive;
        renderTopFive(rankingPanelEl, topFive);
      } catch (err) {
        renderTopFive(rankingPanelEl, state.currentTopFive);
      }
    }

    function startLeaderboardPolling(rankingPanelEl) {
      stopLeaderboardPolling();
      refreshTopFive(rankingPanelEl);
      state.leaderboardPollTimer = setInterval(() => {
        refreshTopFive(rankingPanelEl);
      }, CONFIG.leaderboardRefreshMs);
    }

    function stopLeaderboardPolling() {
      if (state.leaderboardPollTimer) {
        clearInterval(state.leaderboardPollTimer);
        state.leaderboardPollTimer = null;
      }
    }

    /************************************************************
     * DIGIT TASK HELPERS (MT)
     ************************************************************/
    function attachDigitCircle(circleEl) {
      state.digitCircleEl = circleEl;
    }

    function shakeDigitCircle() {
      if (!state.digitCircleEl) return;
      state.digitCircleEl.classList.remove('shake');
      void state.digitCircleEl.offsetWidth;
      state.digitCircleEl.classList.add('shake');
    }

    function onDigitCycleTick() {
      if (state.currentDigit === 3 && !state.digitThreeHandled) {
        shakeDigitCircle();
      }

      state.currentDigit = randomInt(0, 9);
      state.digitThreeActive = state.currentDigit === 3;
      state.digitThreeHandled = false;

      if (state.digitCircleEl) {
        state.digitCircleEl.textContent = String(state.currentDigit);
      }
    }

    function startDigitTask(circleEl) {
      stopDigitTask();
      attachDigitCircle(circleEl);

      state.currentDigit = randomInt(0, 9);
      state.digitThreeActive = state.currentDigit === 3;
      state.digitThreeHandled = false;
      circleEl.textContent = String(state.currentDigit);

      state.digitKeyListener = function(event) {
        if (event.code !== 'Space') return;
        event.preventDefault();

        if (state.currentDigit === 3) {
          state.digitThreeHandled = true;
        } else {
          shakeDigitCircle();
        }
      };

      window.addEventListener('keydown', state.digitKeyListener);
      state.digitTimer = setInterval(onDigitCycleTick, CONFIG.digitIntervalMs);
    }

    function stopDigitTask() {
      if (state.digitTimer) {
        clearInterval(state.digitTimer);
        state.digitTimer = null;
      }
      if (state.digitKeyListener) {
        window.removeEventListener('keydown', state.digitKeyListener);
        state.digitKeyListener = null;
      }
      state.currentDigit = null;
      state.digitThreeActive = false;
      state.digitThreeHandled = false;
      state.digitCircleEl = null;
    }

    /************************************************************
     * TASK SCREEN BUILDERS
     ************************************************************/
    function createRankingPanel() {
      const wrap = document.createElement('div');
      wrap.className = 'ranking-wrap';
      wrap.innerHTML = `
        <div class="ranking-panel">
          <div class="ranking-title">TOP 5 RANKING</div>
          <div class="ranking-row"></div>
          <div class="total-line">Total Points: <span class="total-points-value">0</span></div>
        </div>
      `;
      return wrap;
    }

    function createChoiceStage(xValue, withCenterDigit = false) {
      const stage = document.createElement('div');
      stage.className = 'choice-stage';
      stage.innerHTML = `
        <div class="divider"></div>
        <div class="choice-wrapper">
          <div class="choice-half choice-half-left" data-choice="A">
            <div class="choice-content">
              <div class="option-label">A</div>
              <div class="option-points">10 Points</div>
              <div class="option-prob">80%</div>
            </div>
            <div class="feedback left"></div>
          </div>
          <div class="choice-half choice-half-right" data-choice="B">
            <div class="choice-content">
              <div class="option-label">B</div>
              <div class="option-points">${xValue} Points</div>
              <div class="option-prob">20%</div>
            </div>
            <div class="feedback right"></div>
          </div>
        </div>
      `;

      if (withCenterDigit) {
        const digit = document.createElement('div');
        digit.className = 'digit-circle';
        digit.textContent = '0';
        stage.appendChild(digit);
      }

      return stage;
    }

    function showClickAnywhereMessage(container, message, onClick) {
      const overlay = document.createElement('div');
      overlay.className = 'click-anywhere-message';
      overlay.innerHTML = `<div>${message}</div>`;
      overlay.addEventListener('click', () => onClick(), { once: true });
      container.appendChild(overlay);
      requestAnimationFrame(() => overlay.classList.add('show'));
    }

    async function runTaskBlock({
      taskType,
      isPractice,
      withDigitTask,
      nextScreenBuilder
    }) {
      clearApp();

      const screen = createScreen();
      const outer = document.createElement('div');
      outer.className = 'task-screen-inner';

      const mainRegion = document.createElement('div');
      mainRegion.className = 'task-main-region';

      outer.appendChild(mainRegion);

      let rankingPanel = null;
      if (!isPractice) {
        rankingPanel = createRankingPanel();
        outer.appendChild(rankingPanel);
      }

      screen.appendChild(outer);
      mountScreen(screen);

      if (!isPractice && rankingPanel) {
        renderTopFive(rankingPanel, state.currentTopFive || []);
        startLeaderboardPolling(rankingPanel);
      }

      const totalTrials = isPractice
        ? (taskType === 'ST' ? CONFIG.stPracticeTrials : CONFIG.mtPracticeTrials)
        : CONFIG.formalTrialsPerTask;

      state.currentTask = taskType;

      let trialIndexWithinTask = 0;
      let blockActive = true;
      let awaitingResponse = false;

      async function finishBlock() {
        blockActive = false;
        if (withDigitTask) stopDigitTask();
        if (!isPractice) stopLeaderboardPolling();

        showClickAnywhereMessage(
          mainRegion,
          `Well done! You've completed the practice section. Now click anywhere to move on to the main section.`,
          async () => {
            await fadeOutAndReplace(screen, nextScreenBuilder);
          }
        );
      }

      async function finishFormalBlock() {
        blockActive = false;
        if (withDigitTask) stopDigitTask();
        if (!isPractice) stopLeaderboardPolling();
        await fadeOutAndReplace(screen, nextScreenBuilder);
      }

      async function presentTrial() {
        if (!blockActive) return;

        if (trialIndexWithinTask >= totalTrials) {
          if (isPractice) {
            return finishBlock();
          }
          return finishFormalBlock();
        }

        trialIndexWithinTask += 1;
        state.currentTrial = trialIndexWithinTask;

        const xValue = randomInt(CONFIG.optionB.minX, CONFIG.optionB.maxX);
        const stage = createChoiceStage(xValue, withDigitTask);
        mainRegion.appendChild(stage);

        if (withDigitTask) {
          const digitCircle = stage.querySelector('.digit-circle');
          if (trialIndexWithinTask === 1) {
            startDigitTask(digitCircle);
          } else {
            attachDigitCircle(digitCircle);
            if (state.currentDigit === null) {
              startDigitTask(digitCircle);
            } else {
              digitCircle.textContent = String(state.currentDigit);
            }
          }
        }

        const leftHalf = stage.querySelector('.choice-half-left');
        const rightHalf = stage.querySelector('.choice-half-right');
        const leftFb = stage.querySelector('.feedback.left');
        const rightFb = stage.querySelector('.feedback.right');

        async function handleChoice(choice) {
          if (awaitingResponse || !blockActive) return;
          awaitingResponse = true;

          leftHalf.classList.add('disabled');
          rightHalf.classList.add('disabled');

          const awarded = awardPoints(choice, xValue);
          const choseA = choice === 'A' ? 1 : 0;
          const chosenFb = choice === 'A' ? leftFb : rightFb;
          chosenFb.textContent = `+${awarded}`;
          chosenFb.classList.add('visible');

          if (!isPractice) {
            try {
              await saveFormalTrial({
                task: taskType,
                trialIndex: trialIndexWithinTask,
                choseA,
                xValue,
                pointsAwarded: awarded
              });
              state.currentTotalPoints += awarded;
              if (rankingPanel) {
                await refreshTopFive(rankingPanel);
              }
            } catch (err) {
              chosenFb.classList.remove('visible');
              awaitingResponse = false;
              leftHalf.classList.remove('disabled');
              rightHalf.classList.remove('disabled');
              alert(`Failed to save trial. Please check your connection and try again.\n\n${err.message}`);
              return;
            }
          }

          await sleep(randomInt(CONFIG.choiceResponseMinDelayMs, CONFIG.choiceResponseMaxDelayMs));
          stage.classList.add('hidden');
          await sleep(CONFIG.betweenTrialFadeMs);
          stage.remove();
          awaitingResponse = false;
          presentTrial();
        }

        leftHalf.addEventListener('click', () => handleChoice('A'));
        rightHalf.addEventListener('click', () => handleChoice('B'));
      }

      presentTrial();
    }

    /************************************************************
     * SCREENS
     ************************************************************/
    function showWelcomeScreen() {
      state.currentScreenName = 'welcome';

      const screen = createScreen();
      screen.innerHTML = `
        <div class="center-wrap">
          <div class="panel">
            <h1>Welcome to the experiment</h1>
            <p>Please enter your Participant ID below</p>
            <p class="small-note">(we won't be able to see your ID, it's going to be completely anonymous)</p>
            <input class="text-input" id="participantTextInput" type="text" placeholder="Enter any anonymous code you want" />
            <button class="btn" id="startBtn">Start</button>
            <div class="status-text" id="welcomeStatus"></div>
          </div>
        </div>
      `;
      mountScreen(screen);

      const input = screen.querySelector('#participantTextInput');
      const btn = screen.querySelector('#startBtn');
      const status = screen.querySelector('#welcomeStatus');

      btn.addEventListener('click', async () => {
        if (state.isTransitioning) return;
        btn.disabled = true;
        showStatus(status, 'Starting experiment...');

        try {
          state.participantEnteredText = input.value.trim();
          await registerParticipant();
          state.assignedTaskOrder = softRandomTaskOrder();
          state.currentTotalPoints = 0;
          state.currentTopFive = [];
          state.submittedTrialKeys.clear();

          await fadeOutAndReplace(screen, () => {
            if (state.assignedTaskOrder === 'ST_First') {
              showSTInstructionScreen1();
            } else {
              showMTInstructionScreen2();
            }
          });
        } catch (err) {
          btn.disabled = false;
          showStatus(status, err.message || 'Could not start experiment.', true);
        }
      });
    }

    // ST-FIRST: Screen 2(1)
    function showSTInstructionScreen1() {
      state.currentScreenName = 'st_instruction_1';

      const screen = createCenteredPanelScreen(`
        <p>In this experiment you are going to choose between Option A and Option B. The score for this option is shown below. The percentage indicates the probability that you will receive this score if you select this option.</p>

        <button class="btn" id="startPracticeBtn">Start Practice</button>

    // MT-FIRST: Screen 2(2)
    function showMTInstructionScreen2() {
      state.currentScreenName = 'mt_instruction_2';

      const screen = createCenteredPanelScreen(`
        <p>In this experiment you are going to choose between Option A and Option B. The score for this option will be shown below. The percentage indicates the probability that you will receive this score if you select this option.</p>
        <p>At the same time, numbers 1 through 9 will appear randomly in the center of the screen. When you see the number 3, press the spacebar.</p>

      mountScreen(screen);
      screen.querySelector('#startPracticeBtn').addEventListener('click', async () => {

    // MT-FIRST: Screen 4(2)
    function showMTMainScreen2() {

    // MT-FIRST: Screen 5(2)
    function showTransitionToSTScreen2() {
      state.currentScreenName = 'transition_to_st_2';

      const screen = createCenteredPanelScreen(`
        <p>Congratulations! You’ve completed Part 1. Now you’ll move on to Part 2.</p>
        <p>Click "Start Practice" to start a few practice trials to get familiar with this!</p>
        <button class="btn" id="startPracticeBtn">Start Practice</button>
      `);

      mountScreen(screen);
      screen.querySelector('#startPracticeBtn').addEventListener('click', async () => {
        await fadeOutAndReplace(screen, () => {
          runTaskBlock({

    // MT-FIRST: Screen 7(2)
    function showSTMainScreen2() {
      state.currentScreenName = 'st_main_2';

      });

    /************************************************************
     * FINAL SCREEN
     ************************************************************/
    function startFireworks(canvas) {
      stopFireworks();

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      function resize() {
        canvas.width = Math.floor(canvas.clientWidth * dpr);
        canvas.height = Math.floor(canvas.clientHeight * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();

      const particles = [];

      function spawnFirework() {
        const x = randomInt(80, window.innerWidth - 80);
        const y = randomInt(60, Math.floor(window.innerHeight * 0.55));
        const colors = ['#57B9FF', '#FFD700', '#FF0000', '#B3CEE5', '#000000'];
        const burstCount = randomInt(22, 34);

        for (let i = 0; i < burstCount; i++) {
          const angle = (Math.PI * 2 * i) / burstCount + Math.random() * 0.25;
          const speed = Math.random() * 3 + 1.5;
          particles.push({
            x,
            y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 55 + Math.random() * 28,
            size: Math.random() * 3 + 1.5,
            color: colors[randomInt(0, colors.length - 1)]
          });
        }
      }

      let lastSpawn = 0;

      function animate(ts) {
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        if (!lastSpawn || ts - lastSpawn > 420) {
          spawnFirework();
          lastSpawn = ts;
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.03;
          p.life -= 1;

          ctx.globalAlpha = Math.max(p.life / 80, 0);
          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();

          if (p.life <= 0) particles.splice(i, 1);
        }
        ctx.globalAlpha = 1;

        state.fireworksAnimFrame = requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      state.fireworksAnimFrame = requestAnimationFrame(animate);
    }

    function stopFireworks() {
      if (state.fireworksAnimFrame) {
        cancelAnimationFrame(state.fireworksAnimFrame);
        state.fireworksAnimFrame = null;
      }
    }

    function findRank(leaderboard, participantId) {
      const idx = leaderboard.findIndex(item => String(item.Participant_ID) === String(participantId));
      return idx >= 0 ? idx + 1 : null;
    }

    function renderFinalLeaderboard(panel, leaderboard) {
      const rank = findRank(leaderboard, state.assignedParticipantId);
      const finalHeader = panel.querySelector('.final-header');
      const list = panel.querySelector('.leaderboard-list');

      finalHeader.innerHTML = `
        <h2>Your final result</h2>
        <p>Final Rank: ${rank ? rank : 'N/A'} &nbsp;&nbsp;|&nbsp;&nbsp; Final Total Score: ${state.currentTotalPoints}</p>
      `;

      list.innerHTML = '';

      leaderboard.forEach((item, index) => {
        const row = document.createElement('div');
        const isTop3 = index < 3;
        const isCurrent = String(item.Participant_ID) === String(state.assignedParticipantId);

        row.className = 'leaderboard-item'
          + (isTop3 ? ' top3' : '')
          + (isCurrent ? ' current-user' : '');

        row.innerHTML = `
          <div class="leaderboard-rank">${index + 1}</div>
          <div class="leaderboard-id">${escapeHtml(item.Participant_ID)}</div>
          <div class="leaderboard-points">${Number(item.Total_Points) || 0}</div>
        `;
        list.appendChild(row);
      });
    }

    async function showFinalScreen() {
      state.currentScreenName = 'final_screen';
      clearApp();

      const screen = createScreen();
      screen.innerHTML = `
        <canvas id="fireworksCanvas"></canvas>
        <div class="final-wrap">
          <div class="final-panel">
            <div class="final-header">
              <h2>Your final result</h2>
              <p>Loading final ranking...</p>
            </div>

            <div class="leaderboard-title">Leaderboard</div>
            <div class="leaderboard-list">
              <div class="loading-text">Loading completed participants...</div>
            </div>

            <div class="final-thanks">
              Congratulations on completing all the sections! Thank you for participating!
            </div>
          </div>
        </div>
      `;
      mountScreen(screen);

      const canvas = screen.querySelector('#fireworksCanvas');
      startFireworks(canvas);

      const panel = screen.querySelector('.final-panel');

      try {
        // Give backend a moment in case the 40th trial just triggered final summary/ranking.
        await sleep(700);
        const leaderboard = await buildFullLeaderboardFromRawData();
        renderFinalLeaderboard(panel, leaderboard);
      } catch (err) {
        panel.querySelector('.leaderboard-list').innerHTML = `
          <div class="loading-text error-text">Could not load final leaderboard: ${escapeHtml(err.message)}</div>
        `;
        panel.querySelector('.final-header').innerHTML = `
          <h2>Your final result</h2>
          <p>Final Total Score: ${state.currentTotalPoints}</p>
        `;
      }
    }

    /************************************************************
     * START
     ************************************************************/
    showWelcomeScreen();
  </script>
