<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Risk Task Experiment</title>
  <style>
    :root{
      --light-blue:#B3CEE5;
      --dark-blue:#57B9FF;
      --black:#000000;
      --white:#FFFFFF;
      --red:#FF0000;
      --yellow:#FFD700;
      --fade-ms:500ms;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#fff;
      font-family: Arial, Helvetica, sans-serif;
      color:#000;
      overflow:hidden;
    }

    body.fade-out{ opacity:0; transition:opacity var(--fade-ms) ease; }
    body.fade-in{ opacity:1; transition:opacity var(--fade-ms) ease; }

    #app{
      position:relative;
      width:100vw;
      height:100vh;
      background:#fff;
      overflow:hidden;
    }

    .center-wrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card{
      background:var(--light-blue);
      border-radius:24px;
      padding:28px 32px;
      max-width:760px;
      text-align:center;
      line-height:1.6;
      box-shadow:0 8px 20px rgba(0,0,0,0.08);
    }

    .btn{
      display:inline-block;
      margin-top:18px;
      padding:14px 28px;
      border:none;
      border-radius:18px;
      background:var(--dark-blue);
      color:#fff;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
      box-shadow:0 6px 14px rgba(0,0,0,0.12);
    }
    .btn:hover{
      transform:scale(1.06);
    }

    .input{
      margin-top:14px;
      width:100%;
      max-width:360px;
      padding:12px 14px;
      font-size:16px;
      border:2px solid #000;
      border-radius:14px;
      outline:none;
      background:#fff;
    }

    .message-only{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:30px;
      font-size:30px;
      line-height:1.5;
      font-weight:600;
      background:#fff;
      cursor:pointer;
    }

    /* Choice screens */
    .choice-screen{
      position:absolute;
      inset:0;
      background:#fff;
      overflow:hidden;
    }

    .choice-halves{
      position:absolute;
      inset:0 0 120px 0;
      display:flex;
    }

    .half{
      flex:1;
      position:relative;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:background-color .35s ease, opacity .45s ease;
      cursor:pointer;
      user-select:none;
    }

    .half:hover{
      background:rgba(179,206,229,0.55);
    }

    .half.disabled{
      pointer-events:none;
    }

    .divider{
      position:absolute;
      top:0;
      bottom:120px;
      left:50%;
      width:3px;
      background:#000;
      transform:translateX(-50%);
      z-index:5;
    }

    .option-box{
      text-align:center;
      transition:opacity .45s ease;
    }

    .option-title{
      font-size:58px;
      font-weight:800;
      margin-bottom:10px;
    }

    .option-line{
      font-size:34px;
      font-weight:600;
      line-height:1.35;
    }

    .feedback{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:64px;
      font-weight:800;
      color:#000;
      opacity:0;
      transition:opacity .35s ease;
      pointer-events:none;
      z-index:6;
    }

    .feedback.show{
      opacity:1;
    }

    .fade-choices .option-box{
      opacity:0;
    }

    /* Bottom ranking panel */
    .ranking-panel{
      position:absolute;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      width:min(1040px,92vw);
      min-height:90px;
      background:#fff;
      border:3px solid #000;
      border-radius:18px;
      z-index:20;
      padding:10px 16px 14px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
    }

    .ranking-title{
      text-align:center;
      font-weight:800;
      font-size:20px;
      letter-spacing:.5px;
    }

    .ranking-list{
      display:flex;
      justify-content:center;
      gap:22px;
      flex-wrap:wrap;
      min-height:26px;
      font-size:20px;
      font-weight:700;
    }

    .rank-item.me{
      color:var(--red);
    }

    .total-points{
      text-align:center;
      font-size:28px;
      font-weight:800;
    }

    /* Dual-task digit circle */
    .digit-circle{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:130px;
      height:130px;
      border:3px solid #000;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:56px;
      font-weight:800;
      z-index:15;
      user-select:none;
    }

    .digit-circle.shake{
      animation:shake .36s linear;
    }

    @keyframes shake{
      0%{ transform:translate(-50%,-50%) translateX(0); }
      20%{ transform:translate(-50%,-50%) translateX(-8px); }
      40%{ transform:translate(-50%,-50%) translateX(8px); }
      60%{ transform:translate(-50%,-50%) translateX(-6px); }
      80%{ transform:translate(-50%,-50%) translateX(6px); }
      100%{ transform:translate(-50%,-50%) translateX(0); }
    }

    /* Final leaderboard */
    #fireworks{
      position:absolute;
      inset:0;
      z-index:1;
      pointer-events:none;
    }

    .final-wrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      z-index:2;
    }

    .final-card{
      width:min(760px,92vw);
      max-height:86vh;
      overflow:auto;
      background:#fff;
      border:3px solid #000;
      border-radius:22px;
      padding:24px 24px 18px;
      text-align:center;
      box-shadow:0 12px 24px rgba(0,0,0,0.1);
    }

    .final-rank{
      font-size:28px;
      font-weight:800;
      margin-bottom:14px;
    }

    .final-title{
      font-size:34px;
      font-weight:900;
      margin-bottom:16px;
    }

    .leaderboard-list{
      text-align:left;
      margin:0 auto 18px;
      max-width:540px;
      padding:0;
      list-style:none;
    }

    .leaderboard-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
      padding:12px 16px;
      margin-bottom:10px;
      border:2px solid #000;
      border-radius:14px;
      font-size:22px;
      font-weight:700;
      background:#fff;
    }

    .leaderboard-item.top3{
      background:rgba(255,215,0,.45);
    }

    .leaderboard-item.me{
      color:var(--red);
      border-color:var(--red);
    }

    .final-note{
      font-size:24px;
      font-weight:700;
      line-height:1.45;
      margin-top:8px;
    }

    .small{
      font-size:15px;
      opacity:.88;
    }
  </style>
</head>
<body class="fade-in">
  <div id="app"></div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2PUodouQhTa_zoVS301n-5wh1w9T2gqWXEK7-G6cw03dlrpie7FjxLTR2ott6IVQ55Q/exec";

    const state = {
      typedId: "",
      participantId: "",
      taskOrder: "",
      totalPoints: 0,
      currentTask: "",
      currentTaskTrial: 0,
      firstTask: "",
      secondTask: "",
      currentX: 0,
      isPractice: false,
      globalLeaderboard: [],
      fullLeaderboard: [],
      digitTimer: null,
      currentDigit: null,
      awaitingThree: false,
      circleEl: null,
      finishedMainTasks: 0
    };

    const app = document.getElementById("app");

    /* ---------------------- Helpers ---------------------- */

    function randInt(min, max){
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomX(){
      return randInt(1, 60);
    }

    function fadeTo(renderFn){
      document.body.classList.remove("fade-in");
      document.body.classList.add("fade-out");
      setTimeout(() => {
        renderFn();
        document.body.classList.remove("fade-out");
        document.body.classList.add("fade-in");
      }, 260);
    }

    function safeText(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;"
      }[m]));
    }

    async function apiInitParticipant(){
      const res = await fetch(WEB_APP_URL, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "init_participant"
        })
      });
      return await res.json();
    }

    async function apiSaveTrial(payload){
      const res = await fetch(WEB_APP_URL, {
        method:"POST",
        headers:{ "Content-Type":"text/plain;charset=utf-8" },
        body: JSON.stringify({
          action: "save_trial",
          ...payload
        })
      });
      return await res.json();
    }

    async function apiGetLeaderboard(){
      const res = await fetch(WEB_APP_URL + "?mode=leaderboard");
      return await res.json();
    }

    async function apiGetAllTrials(){
      const res = await fetch(WEB_APP_URL + "?mode=all_trials");
      return await res.json();
    }

    function clearDigitTask(){
      if(state.digitTimer){
        clearInterval(state.digitTimer);
        state.digitTimer = null;
      }
      window.removeEventListener("keydown", onDigitKeyDown);
      state.currentDigit = null;
      state.awaitingThree = false;
      state.circleEl = null;
    }

    function startDigitTask(circleEl){
      clearDigitTask();
      state.circleEl = circleEl;

      function nextDigit(){
        if(state.awaitingThree){
          shakeCircle();
        }
        const d = randInt(0,9);
        state.currentDigit = d;
        state.awaitingThree = (d === 3);
        circleEl.textContent = d;
      }

      nextDigit();
      state.digitTimer = setInterval(nextDigit, 2000);
      window.addEventListener("keydown", onDigitKeyDown);
    }

    function onDigitKeyDown(e){
      if(e.code !== "Space") return;
      e.preventDefault();

      if(state.currentDigit === 3 && state.awaitingThree){
        state.awaitingThree = false;
      } else {
        shakeCircle();
      }
    }

    function shakeCircle(){
      if(!state.circleEl) return;
      state.circleEl.classList.remove("shake");
      void state.circleEl.offsetWidth;
      state.circleEl.classList.add("shake");
    }

    async function refreshTop5(){
      try{
        const data = await apiGetLeaderboard();
        if(data && data.success){
          state.globalLeaderboard = data.leaderboard || [];
        }
      }catch(err){
        console.warn("Leaderboard fetch failed:", err);
      }
    }

    function mergedTop5(){
      const arr = [...state.globalLeaderboard.map(x => ({
        Participant_ID: String(x.Participant_ID),
        Total_Points: Number(x.Total_Points)
      }))];

      const existingIndex = arr.findIndex(x => x.Participant_ID === state.participantId);
      if(existingIndex >= 0){
        arr[existingIndex].Total_Points = Math.max(arr[existingIndex].Total_Points, state.totalPoints);
      } else if(state.participantId){
        arr.push({
          Participant_ID: state.participantId,
          Total_Points: state.totalPoints
        });
      }

      arr.sort((a,b) => b.Total_Points - a.Total_Points);
      return arr.slice(0,5);
    }

    function rankingPanelHTML(){
      const top5 = mergedTop5();
      const items = top5.map(item => {
        const me = item.Participant_ID === state.participantId ? "me" : "";
        return `<div class="rank-item ${me}">${safeText(item.Participant_ID)}: ${item.Total_Points}</div>`;
      }).join("");

      return `
        <div class="ranking-panel">
          <div class="ranking-title">TOP 5 RANKING</div>
          <div class="ranking-list">${items || "<div>No scores yet</div>"}</div>
          <div class="total-points">Total Points: ${state.totalPoints}</div>
        </div>
      `;
    }

    function buildChoiceScreen({
      showRanking = false,
      dualTask = false,
      practice = false,
      taskName = "ST",
      totalTrials = 3,
      afterFinish
    }){
      clearDigitTask();
      state.isPractice = practice;
      state.currentTask = taskName;
      state.currentTaskTrial = 1;
      state.currentX = randomX();

      app.innerHTML = `
        <div class="choice-screen">
          <div class="choice-halves">
            <div class="half" id="leftHalf">
              <div class="option-box" id="leftBox">
                <div class="option-title">A</div>
                <div class="option-line">10 Points</div>
                <div class="option-line">80%</div>
              </div>
              <div class="feedback" id="leftFeedback"></div>
            </div>
            <div class="half" id="rightHalf">
              <div class="option-box" id="rightBox">
                <div class="option-title">B</div>
                <div class="option-line"><span id="xDisplay">${state.currentX}</span> Points</div>
                <div class="option-line">20%</div>
              </div>
              <div class="feedback" id="rightFeedback"></div>
            </div>
          </div>

          <div class="divider"></div>

          ${dualTask ? `<div class="digit-circle" id="digitCircle">0</div>` : ""}
          ${showRanking ? rankingPanelHTML() : ""}
        </div>
      `;

      const leftHalf = document.getElementById("leftHalf");
      const rightHalf = document.getElementById("rightHalf");
      const leftFeedback = document.getElementById("leftFeedback");
      const rightFeedback = document.getElementById("rightFeedback");
      const xDisplay = document.getElementById("xDisplay");

      if(dualTask){
        const circle = document.getElementById("digitCircle");
        startDigitTask(circle);
      }

      async function handleChoice(choice){
        leftHalf.classList.add("disabled");
        rightHalf.classList.add("disabled");

        const choseA = choice === "A" ? 1 : 0;
        const pointsAwarded = resolvePoints(choice, state.currentX);

        if(choice === "A"){
          leftFeedback.textContent = `+${pointsAwarded}`;
          leftFeedback.classList.add("show");
        } else {
          rightFeedback.textContent = `+${pointsAwarded}`;
          rightFeedback.classList.add("show");
        }

        if(!practice){
          state.totalPoints += pointsAwarded;
          if(showRanking){
            updateRankingPanel();
          }

          try{
            const result = await apiSaveTrial({
              Participant_ID: state.participantId,
              Task: taskName,
              Trial_Index: state.currentTaskTrial,
              Chose_A: choseA,
              X_Value: state.currentX,
              Points_Awarded: pointsAwarded,
              Task_Order: state.taskOrder
            });

            if(result && result.success){
              state.totalPoints = Number(result.Total_Points ?? state.totalPoints);
            }
          }catch(err){
            console.warn("save_trial failed:", err);
          }

          await refreshTop5();
          if(showRanking){
            updateRankingPanel();
          }
        }

        setTimeout(() => {
          document.querySelector(".choice-screen").classList.add("fade-choices");
        }, 500);

        setTimeout(async () => {
          leftFeedback.classList.remove("show");
          rightFeedback.classList.remove("show");

          if(state.currentTaskTrial >= totalTrials){
            clearDigitTask();
            afterFinish();
            return;
          }

          state.currentTaskTrial += 1;
          state.currentX = randomX();
          xDisplay.textContent = state.currentX;
          document.querySelector(".choice-screen").classList.remove("fade-choices");
          leftHalf.classList.remove("disabled");
          rightHalf.classList.remove("disabled");
        }, 1200);
      }

      leftHalf.addEventListener("click", () => handleChoice("A"));
      rightHalf.addEventListener("click", () => handleChoice("B"));

      function updateRankingPanel(){
        const panel = document.querySelector(".ranking-panel");
        if(panel){
          panel.outerHTML = rankingPanelHTML();
        }
      }
    }

    function resolvePoints(choice, x){
      if(choice === "A"){
        return Math.random() < 0.8 ? 10 : 0;
      } else {
        return Math.random() < 0.2 ? x : 0;
      }
    }

    /* ---------------------- Screens ---------------------- */

    function screen1(){
      clearDigitTask();
      app.innerHTML = `
        <div class="center-wrap">
          <div class="card">
            <div style="font-size:34px;font-weight:800;">Welcome to the experiment</div>
            <div style="font-size:22px;margin-top:8px;">Please enter your Participant ID below</div>
            <div class="small">(we won't be able to see your ID, its going to be completely anonymous)</div>
            <div style="display:flex;justify-content:center;">
              <input class="input" id="typedIdInput" placeholder="Enter any ID you want" />
            </div>
            <button class="btn" id="startBtn">Start</button>
          </div>
        </div>
      `;

      document.getElementById("startBtn").addEventListener("click", async () => {
        const btn = document.getElementById("startBtn");
        btn.disabled = true;
        state.typedId = document.getElementById("typedIdInput").value.trim();

        try{
          const init = await apiInitParticipant();
          if(!init.success) throw new Error(init.error || "Initialization failed");
          state.participantId = init.Participant_ID;
          state.taskOrder = init.Task_Order;
          state.firstTask = state.taskOrder === "ST_First" ? "ST" : "MT";
          state.secondTask = state.firstTask === "ST" ? "MT" : "ST";
          state.totalPoints = 0;
          await refreshTop5();

          fadeTo(() => {
            if(state.firstTask === "ST"){
              screen2_1();
            } else {
              screen2_2();
            }
          });
        }catch(err){
          alert("Failed to initialize participant. Please try again.\n" + err);
          btn.disabled = false;
        }
      });
    }

    // ST first flow
    function screen2_1(){
      app.innerHTML = `
        <div class="center-wrap">
          <div class="card">
            <div style="font-size:22px;font-weight:700;">
              In this experiment you are going to choose between Option A and Option B.
              The score for this option is shown below. The percentage indicates the probability
              that you will receive this score if you select this option.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              Click "Start Practice" to start a few practice trials to get familiar with this!
            </div>
            <button class="btn" id="goPractice">Start Practice</button>
          </div>
        </div>
      `;
      document.getElementById("goPractice").onclick = () => fadeTo(screen3_1);
    }

    function screen3_1(){
      buildChoiceScreen({
        showRanking:false,
        dualTask:false,
        practice:true,
        taskName:"ST",
        totalTrials:3,
        afterFinish: () => {
          fadeTo(() => practiceDoneMessage(screen4_1));
        }
      });
    }

    function screen4_1(){
      buildChoiceScreen({
        showRanking:true,
        dualTask:false,
        practice:false,
        taskName:"ST",
        totalTrials:20,
        afterFinish: () => {
          fadeTo(screen5_1);
        }
      });
    }

    function screen5_1(){
      clearDigitTask();
      app.innerHTML = `
        <div class="message-only" id="nextMessage">
          Congratulations! You’ve completed Part 1. Now click anywhere too move on to Part 2.
        </div>
      `;
      document.getElementById("nextMessage").onclick = () => fadeTo(screen6_1);
    }

    function screen6_1(){
      app.innerHTML = `
        <div class="center-wrap">
          <div class="card">
            <div style="font-size:22px;font-weight:700;">
              In this experiment you are going to choose between Option A and Option B.
              The score for this option will be shown below. The percentage indicates the probability
              that you will receive this score if you select this option.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              At the same time, numbers 1 through 9 will appear randomly in the center of the screen.
              When you see the number 3, press the spacebar.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              Click "Start Practice" to start a few practice trials to get familiar with this!
            </div>
            <button class="btn" id="goPractice">Start Practice</button>
          </div>
        </div>
      `;
      document.getElementById("goPractice").onclick = () => fadeTo(screen7_1);
    }

    function screen7_1(){
      buildChoiceScreen({
        showRanking:true,
        dualTask:true,
        practice:true,
        taskName:"MT",
        totalTrials:3,
        afterFinish: () => {
          fadeTo(() => practiceDoneMessage(screen8_1));
        }
      });
    }

    function screen8_1(){
      buildChoiceScreen({
        showRanking:true,
        dualTask:true,
        practice:false,
        taskName:"MT",
        totalTrials:20,
        afterFinish: async () => {
          await prepareFinalLeaderboard();
          fadeTo(screen9);
        }
      });
    }

    // MT first flow
    function screen2_2(){
      app.innerHTML = `
        <div class="center-wrap">
          <div class="card">
            <div style="font-size:22px;font-weight:700;">
              In this experiment you are going to choose between Option A and Option B.
              The score for this option will be shown below. The percentage indicates the probability
              that you will receive this score if you select this option.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              At the same time, numbers 1 through 9 will appear randomly in the center of the screen.
              When you see the number 3, press the spacebar.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              Click "Start Practice" to start a few practice trials to get familiar with this!
            </div>
            <button class="btn" id="goPractice">Start Practice</button>
          </div>
        </div>
      `;
      document.getElementById("goPractice").onclick = () => fadeTo(screen3_2);
    }

    function screen3_2(){
      buildChoiceScreen({
        showRanking:false,
        dualTask:true,
        practice:true,
        taskName:"MT",
        totalTrials:3,
        afterFinish: () => {
          fadeTo(() => practiceDoneMessage(screen4_2));
        }
      });
    }

    function screen4_2(){
      buildChoiceScreen({
        showRanking:true,
        dualTask:true,
        practice:false,
        taskName:"MT",
        totalTrials:20,
        afterFinish: () => {
          fadeTo(screen5_2);
        }
      });
    }

    function screen5_2(){
      clearDigitTask();
      app.innerHTML = `
        <div class="message-only" id="nextMessage">
          Congratulations! You’ve completed Part 1. Now click anywhere too move on to Part 2.
        </div>
      `;
      document.getElementById("nextMessage").onclick = () => fadeTo(screen6_2);
    }

    function screen6_2(){
      app.innerHTML = `
        <div class="center-wrap">
          <div class="card">
            <div style="font-size:22px;font-weight:700;">
              In this experiment you are going to choose between Option A and Option B.
              The score for this option is shown below. The percentage indicates the probability
              that you will receive this score if you select this option.
            </div>
            <div style="font-size:22px;margin-top:10px;">
              Click "Start Practice" to start a few practice trials to get familiar with this!
            </div>
            <button class="btn" id="goPractice">Start Practice</button>
          </div>
        </div>
      `;
      document.getElementById("goPractice").onclick = () => fadeTo(screen7_2);
    }

    function screen7_2(){
      buildChoiceScreen({
        showRanking:false,
        dualTask:false,
        practice:true,
        taskName:"ST",
        totalTrials:3,
        afterFinish: () => {
          fadeTo(() => practiceDoneMessage(screen8_2));
        }
      });
    }

    function screen8_2(){
      buildChoiceScreen({
        showRanking:true,
        dualTask:false,
        practice:false,
        taskName:"ST",
        totalTrials:20,
        afterFinish: async () => {
          await prepareFinalLeaderboard();
          fadeTo(screen9);
        }
      });
    }

    function practiceDoneMessage(nextScreenFn){
      clearDigitTask();
      app.innerHTML = `
        <div class="message-only" id="practiceDone">
          Well done! You've completed the practice section. Now click anywhere to move on to the main section.
        </div>
      `;
      document.getElementById("practiceDone").onclick = () => fadeTo(nextScreenFn);
    }

    async function prepareFinalLeaderboard(){
      await refreshTop5();
      try{
        const data = await apiGetAllTrials();
        const trials = (data && data.success && Array.isArray(data.data)) ? data.data : [];

        const totals = {};
        for(const row of trials){
          const pid = String(row.Participant_ID || "");
          const tp = Number(row.Total_Points || 0);
          if(!pid) continue;
          if(!(pid in totals) || tp > totals[pid]){
            totals[pid] = tp;
          }
        }

        if(state.participantId){
          totals[state.participantId] = Math.max(Number(totals[state.participantId] || 0), state.totalPoints);
        }

        state.fullLeaderboard = Object.keys(totals)
          .map(pid => ({ Participant_ID: pid, Total_Points: totals[pid] }))
          .sort((a,b) => b.Total_Points - a.Total_Points);
      }catch(err){
        console.warn("final leaderboard build failed:", err);
        state.fullLeaderboard = mergedTop5();
      }
    }

    function screen9(){
      clearDigitTask();
      app.innerHTML = `
        <canvas id="fireworks"></canvas>
        <div class="final-wrap">
          <div class="final-card">
            <div class="final-rank" id="finalRank"></div>
            <div class="final-title">Leaderboard</div>
            <ul class="leaderboard-list" id="leaderboardList"></ul>
            <div class="final-note">
              Congratulations on completing all the sections! Thank you for participating!
            </div>
          </div>
        </div>
      `;

      const list = document.getElementById("leaderboardList");
      const rankDiv = document.getElementById("finalRank");
      const arr = state.fullLeaderboard.length ? state.fullLeaderboard : mergedTop5();

      let myRank = -1;
      arr.forEach((item, idx) => {
        if(item.Participant_ID === state.participantId && myRank === -1){
          myRank = idx + 1;
        }

        const li = document.createElement("li");
        li.className = "leaderboard-item";
        if(idx < 3) li.classList.add("top3");
        if(item.Participant_ID === state.participantId) li.classList.add("me");

        li.innerHTML = `
          <span>#${idx + 1} &nbsp; ${safeText(item.Participant_ID)}</span>
          <span>${item.Total_Points}</span>
        `;
        list.appendChild(li);
      });

      rankDiv.textContent = `Your Rank: #${myRank > 0 ? myRank : "-"}   |   Final Score: ${state.totalPoints}`;
      startFireworks();
    }

    /* ---------------------- Fireworks ---------------------- */

    function startFireworks(){
      const canvas = document.getElementById("fireworks");
      if(!canvas) return;
      const ctx = canvas.getContext("2d");

      function resize(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      const particles = [];

      function spawnFirework(){
        const x = Math.random() * canvas.width;
        const y = Math.random() * (canvas.height * 0.55) + 40;
        const colors = ["#ff595e","#ffca3a","#8ac926","#1982c4","#6a4c93","#ff6b6b","#4ecdc4"];
        const count = 24 + Math.floor(Math.random() * 12);

        for(let i=0;i<count;i++){
          const angle = Math.random() * Math.PI * 2;
          const speed = 1 + Math.random() * 4.5;
          particles.push({
            x, y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 70 + Math.random() * 25,
            color: colors[Math.floor(Math.random()*colors.length)],
            size: 2 + Math.random() * 2.8
          });
        }
      }

      let lastSpawn = 0;

      function animate(ts){
        ctx.clearRect(0,0,canvas.width,canvas.height);

        if(ts - lastSpawn > 500){
          spawnFirework();
          lastSpawn = ts;
        }

        for(let i = particles.length - 1; i >= 0; i--){
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.025;
          p.life -= 1;

          ctx.globalAlpha = Math.max(p.life / 100, 0);
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();

          if(p.life <= 0){
            particles.splice(i,1);
          }
        }

        ctx.globalAlpha = 1;
        requestAnimationFrame(animate);
      }

      requestAnimationFrame(animate);
    }

    /* ---------------------- Start ---------------------- */

    screen1();
  </script>
</body>
</html>
